spring:
  application:
    name: telemedecine
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public,audit
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

telemedecine:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-replace-with-a-long-random-string}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
  # File uploads (doctor credentials, lab-result PDFs, etc.) live on local
  # disk — see LocalFileStorage. Backed by a Docker volume in docker-compose.
  storage:
    root: ${STORAGE_ROOT:/app/uploads}
    max-file-size-mb: ${STORAGE_MAX_FILE_SIZE_MB:10}
  livekit:
    # url = how the backend would reach LiveKit (unused for now — tokens are
    # signed locally). public-url = how the *browser* reaches LiveKit, handed to
    # the client in the join response.
    url: ${LIVEKIT_URL:ws://localhost:7880}
    public-url: ${LIVEKIT_PUBLIC_URL:ws://localhost:7880}
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:devsecret-min-32-chars-aaaaaaaaaaaaaa}
  # Clinic-local timezone. Doctor availability blocks are wall-clock times in
  # this zone; the backend expands them into UTC slot instants. Nouakchott is
  # UTC+0 year-round (no DST).
  clinic:
    zone: ${CLINIC_ZONE:Africa/Nouakchott}
