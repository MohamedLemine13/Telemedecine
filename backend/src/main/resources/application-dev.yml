spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemedecine}
    username: ${DB_USER:telemed}
    password: ${DB_PASSWORD:change-me-in-real-env}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.irt42.telemedecine: DEBUG
    org.hibernate.SQL: INFO
