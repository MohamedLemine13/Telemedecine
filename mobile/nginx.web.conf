# Serves the Flutter *web* build of the patient app and reverse-proxies API /
# WebSocket traffic to the backend container, so the app runs same-origin and
# never hits CORS. Mirrors frontend/nginx.conf.

upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 15M;

    # ── Backend API ──────────────────────────────────────────────────────────
    location ^~ /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket (kept for parity with the web frontend) ────────────────────
    location ^~ /ws {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
    }

    # ── Static Flutter web assets ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # index.html must not be cached so a rebuild's new asset hashes are seen.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }
}
