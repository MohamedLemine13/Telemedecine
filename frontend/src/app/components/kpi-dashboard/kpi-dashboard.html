<div class="kpi-grid">
  @for (kpi of kpiData(); track kpi.title) {
    <app-kpi-card
      [title]="kpi.title"
      [value]="kpi.value"
      [changePercent]="kpi.changePercent"
      [trendPeriod]="kpi.trendPeriod"
      [iconColor]="kpi.iconColor"
      [chartType]="kpi.chartType"
      [chartData]="kpi.chartData"
    />
  }
</div>
