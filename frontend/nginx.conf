# Serves the Angular SPA + reverse-proxies API / WebSocket / Swagger traffic
# to the backend container on the internal docker network.

upstream backend {
    # `backend` is the docker-compose service name on the shared network.
    # NOTE: underscore-free on purpose — Tomcat 10+ rejects Host headers
    # containing underscores (RFC 952/1123). nginx falls back to the upstream
    # name as the default Host header when proxy_set_header Host is missing,
    # so the upstream name itself must be a valid hostname.
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    # Max upload size. The Spring servlet config caps multipart at 10 MB
    # (see application.yml); a little headroom here keeps nginx out of the
    # error path so the backend's friendlier 400 response can surface.
    client_max_body_size 15M;

    # Hashed Angular assets (chunk-XXXX.js, polyfills.HASH.js, etc.) live
    # under content-addressed filenames, so we can cache them indefinitely.
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ── Backend API (HTTP) ───────────────────────────────────────────────────
    location ^~ /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── OpenAPI / Swagger UI / Actuator (handy in dev) ───────────────────────
    location ^~ /v3/api-docs {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location ^~ /swagger-ui {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location ^~ /swagger-ui.html {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location ^~ /actuator/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (STOMP for chat + signalling) ──────────────────────────────
    location ^~ /ws {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # index.html references hashed bundle filenames. It MUST be re-fetched on
    # every navigation so the browser sees the current build's chunk hashes
    # after an image rebuild — otherwise it tries to load chunks that no
    # longer exist and 404s.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }
    location / {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
        try_files $uri $uri/ /index.html;
    }
}
