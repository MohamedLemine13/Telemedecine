# Full local stack for the Telemedecine school project.
#
#   docker compose up -d --build      # build images + start everything
#   docker compose logs -f backend    # tail one service
#   docker compose down               # stop, keep data
#   docker compose down -v            # stop and drop database / uploaded files
#
# Once up:
#   http://localhost:4200    Angular app (nginx → SPA + reverse-proxy /api,/ws,/swagger-ui)
#   http://localhost:8080    Backend direct (Swagger at /swagger-ui.html)
#   http://localhost:8025    MailHog UI
#   ws://localhost:7880      LiveKit signalling (Phase 4)

name: telemedecine

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: telemed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-telemedecine}
      POSTGRES_USER: ${DB_USER:-telemed}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-real-env}
    ports:
      - "5442:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-telemed} -d ${DB_NAME:-telemedecine}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:latest
    container_name: telemed-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  livekit:
    image: livekit/livekit-server:latest
    container_name: telemed-livekit
    restart: unless-stopped
    # --node-ip is the IP LiveKit advertises in ICE candidates for media. It
    # MUST be an address the clients can reach: 127.0.0.1 for same-machine only,
    # or this PC's LAN IP so phones/other computers on the network can receive
    # the WebRTC streams (the 50000-50100/udp range is published to the host).
    command: --config /etc/livekit.yaml --node-ip ${HOST_LAN_IP:-127.0.0.1}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro

  # ─── Application ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    image: telemedecine/backend:dev
    container_name: telemed-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-telemedecine}
      DB_USER: ${DB_USER:-telemed}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-real-env}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      STORAGE_ROOT: /app/uploads
      LIVEKIT_URL: ws://livekit:7880
      # public-url = how the *browser/phone* reaches LiveKit (handed back in the
      # join response). Defaults to localhost for same-machine use; set
      # LIVEKIT_PUBLIC_URL=ws://<LAN-ip>:7880 in .env for network access.
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret-min-32-chars-aaaaaaaaaaaaaa}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-please-replace-with-a-long-random-string}
    volumes:
      # File uploads (doctor credentials, lab-result PDFs). Survives container
      # restarts; cleared by `docker compose down -v`.
      - uploads-data:/app/uploads
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    image: telemedecine/frontend:dev
    container_name: telemed-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4200:80"
      # HTTPS — required so the browser grants camera/mic access (getUserMedia
      # is blocked on insecure origins). Served with the project's own
      # CA-signed cert (pki/), mounted below. Host 443 is held by the existing
      # nginx-proxy-manager, so this project uses 4443.
      #   Open https://187.124.219.82:4443
      - "4443:443"
    volumes:
      # Real PKI: CA-signed leaf (+ CA chain) and its key, plus the live nginx
      # config — all bind-mounted so certificates and proxy rules can be rotated
      # without rebuilding the image. The cert SAN includes 187.124.219.82, so
      # importing pki/certs/ca.cert.pem into a device's trust store makes the
      # site fully trusted (no warning) — a genuine secure context for camera.
      - ./pki/server.fullchain.pem:/etc/nginx/certs/server.fullchain.pem:ro
      - ./pki/server.key.pem:/etc/nginx/certs/server.key.pem:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/app.conf:ro

  # ─── Mobile (one-shot APK builder) ──────────────────────────────────────────
  # Not part of the running stack — only built on demand under the `mobile`
  # profile. Generates the Flutter scaffold + builds a debug APK entirely in the
  # container, dropping it into ./mobile/dist.
  #
  #   docker compose --profile mobile run --rm mobile-build
  #
  # Set MOBILE_API_BASE_URL to where the phone can reach the backend
  # (http://10.0.2.2:8080 for the Android emulator, http://<LAN-ip>:8080 for a
  # real device).
  mobile-build:
    profiles: ["mobile"]
    build:
      context: ./mobile
      dockerfile: ../infra/docker/flutter.Dockerfile
      args:
        API_BASE_URL: ${MOBILE_API_BASE_URL:-https://187.124.219.82:4443}
    image: telemedecine/mobile-build:dev
    volumes:
      - ./mobile/dist:/out

  # ─── Mobile app as a website (Flutter web) ──────────────────────────────────
  # The same patient app compiled for the browser — no phone/emulator needed.
  #   docker compose --profile mobile-web up -d --build mobile-web
  #   → http://localhost:4300
  mobile-web:
    profiles: ["mobile-web"]
    build:
      context: ./mobile
      dockerfile: ../infra/docker/flutter-web.Dockerfile
    image: telemedecine/mobile-web:dev
    container_name: telemed-mobile-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4300:80"

volumes:
  postgres-data:
  uploads-data:
